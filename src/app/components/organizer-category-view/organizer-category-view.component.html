<div class="category-view-container">
  <p-splitter [panelSizes]="[40, 60]" [style]="{'height': 'calc(100vh - 60px)'}">
    <ng-template #panel>
      <div class="table-panel">
        <div class="table-inner-wrapper">
      <p-table [value]="categories" dataKey="id" selectionMode="single" [(selection)]="selectedCategory"
               (onRowSelect)="onCategorySelect($event.data)">
        <ng-template #header>
          <tr>
            <th>
              Kategoria
            </th>
            <th>
              <button
                pButton pRipple
                type="button"
                icon="pi pi-plus"
                (click)="onCreateCategoryClick()">
              </button>
            </th>
            <th style="width: 5rem"></th>
          </tr>
        </ng-template>
        <ng-template #body let-category let-expanded="expanded">
          <tr [pSelectableRow]="category">
            <td>{{ category.name }}</td>
            <td>{{ category.routeName }}</td>
            <!-- dodo wyswietlanie maksymalnego czasu -->
            <td>
              <div style="display: flex; gap: 8px; align-items: center">
                <button
                  pButton pRipple
                  type="button"
                  icon="pi pi-trash"
                  (click)="onDeleteCategoryClick(category.id)">
                </button>
              </div>
            </td>
          </tr>
        </ng-template>
      </p-table>
        </div>
      </div>
    </ng-template>
    <ng-template #panel>
      <div class="map-panel-content">
        <div *ngIf="isLoading" class="loading-overlay">
          <div class="loading-indicator">
            <p-progressSpinner styleClass="custom-spinner" strokeWidth="4"></p-progressSpinner>
            <p>Trwa pobieranie mapy, proszę czekać...</p>
          </div>
        </div>
        <backoffice-map
          [stationsToShow]="getStationsForCategory()"
          [backgroundMapId]="currentMapId"
          [minZoom]="currentMinZoom"
          [maxZoom]="currentMaxZoom"
          [northEast]="currentNorthEast"
          [southWest]="currentSouthWest"
        >
        </backoffice-map>
        <p-dialog header="Dodaj kategorię" [modal]="true" [(visible)]="showAddCategoryForm" [dismissableMask]="true" [responsive]="true" [style]="{width: '90vw', maxWidth: '500px'}">
          <form [formGroup]="addCategoryForm" (ngSubmit)="onSubmitAddCategoryForm()" class="category-form">
            <input type="text" [pAutoFocus]="true" pInputText formControlName="name" placeholder="Nazwa"/>
            <p-dropdown
              [options]="routeOptions"
              formControlName="routeId"
              optionLabel="name"
              optionValue="id"
              placeholder="Trasa"
              [appendTo]="'body'"
              [baseZIndex]="10001">
            </p-dropdown>
            <button pButton type="submit" [disabled]="addCategoryForm.invalid">Dodaj</button>
          </form>
        </p-dialog>
